<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>XFU - Orthopaedic Clinic Survival Guide</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#EFF6FF', 100: '#DBEAFE', 500: '#3B82F6', 600: '#2563EB', 700: '#1D4ED8' },
          }
        }
      }
    }
  </script>
  <script src="data.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #F8FAFC;
      color: #111827;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .collapsible-content {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.2s ease;
    }
    .collapsible-content.collapsed {
      max-height: 0 !important;
      opacity: 0;
    }
    .collapsible-content.expanded {
      opacity: 1;
    }
    .chevron {
      transition: transform 0.25s ease;
      display: inline-block;
    }
    .chevron.open {
      transform: rotate(90deg);
    }
    .rehab-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .rehab-table-wrap table {
      min-width: 600px;
    }
    .rehab-table-wrap td:first-child,
    .rehab-table-wrap th:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
    }
    .rehab-table-wrap thead th:first-child {
      background: #EFF6FF;
    }
    .rehab-table-wrap tbody tr:nth-child(odd) td:first-child {
      background: #FFFFFF;
    }
    .rehab-table-wrap tbody tr:nth-child(even) td:first-child {
      background: #F9FAFB;
    }
    .ref-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: #2563EB;
      background: #EFF6FF;
      border-radius: 4px;
      padding: 0px 4px;
      margin-left: 2px;
      text-decoration: none;
      cursor: pointer;
      vertical-align: super;
      line-height: 1;
      transition: background 0.15s;
    }
    .ref-link:hover {
      background: #DBEAFE;
    }
    .category-card {
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      padding: 16px 18px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .category-card:hover {
      border-color: #93C5FD;
      box-shadow: 0 2px 8px rgba(59,130,246,0.08);
    }
    .section-card {
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 14px 16px;
      transition: all 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .section-card:hover {
      border-color: #93C5FD;
      box-shadow: 0 2px 6px rgba(59,130,246,0.06);
    }
    .block-card {
      background: white;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .figure-img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #E5E7EB;
    }
    header {
      backdrop-filter: blur(12px);
      background: rgba(248, 250, 252, 0.92);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // =========================================================================
    // ICONS
    // =========================================================================
    const ChevronIcon = ({ open }) => (
      <span className={`chevron ${open ? 'open' : ''}`}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M6 4l4 4-4 4" />
        </svg>
      </span>
    );

    const BackIcon = () => (
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M15 10H5M5 10l5-5M5 10l5 5" />
      </svg>
    );

    const SearchIcon = () => (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="8" cy="8" r="5" />
        <path d="M14 14l-2.9-2.9" />
      </svg>
    );

    const ClearIcon = () => (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 5l8 8M13 5l-8 8" />
      </svg>
    );

    const WarningIcon = () => (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 2L1.5 15.5h15L9 2z" stroke="#DC2626" strokeWidth="1.5" fill="none" strokeLinejoin="round"/>
        <path d="M9 7v3.5" stroke="#DC2626" strokeWidth="1.5" strokeLinecap="round"/>
        <circle cx="9" cy="13" r="0.75" fill="#DC2626"/>
      </svg>
    );

    const EscalationIcon = () => (
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#D97706" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 2v10M9 2l-3 3M9 2l3 3M3 16h12" />
      </svg>
    );

    const BookIcon = () => (
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#6B7280" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 3h4c1.1 0 2 .9 2 2v8a1.5 1.5 0 00-1.5-1.5H2V3zM14 3h-4c-1.1 0-2 .9-2 2v8a1.5 1.5 0 011.5-1.5H14V3z"/>
      </svg>
    );

    // =========================================================================
    // UTILITY
    // =========================================================================

    // Parse [ref:N] markers in text and render as superscript links
    function RichText({ text, onRefClick, onNavigate, noBoldColon }) {
      if (!text || typeof text !== 'string') return text;
      // Split on [ref:N], **bold**, and [link:id|text] markers
      const tokens = text.split(/(\[ref:\d+\]|\*\*[^*]+\*\*|\[link:[^\]]+\])/g);
      const rendered = tokens.map((tok, i) => {
        const refMatch = tok.match(/^\[ref:(\d+)\]$/);
        if (refMatch) {
          const refNum = parseInt(refMatch[1], 10);
          return (
            <a key={i} className="ref-link" onClick={(e) => { e.stopPropagation(); onRefClick && onRefClick(refNum); }} title={GUIDE_DATA.references[refNum - 1] || ''}>
              {refNum}
            </a>
          );
        }
        const linkMatch = tok.match(/^\[link:([^|]+)\|(.+)\]$/);
        if (linkMatch) {
          const sectionId = linkMatch[1];
          const label = linkMatch[2];
          return (
            <a key={i} className="text-blue-600 underline cursor-pointer" onClick={(e) => { e.stopPropagation(); onNavigate && onNavigate('section', sectionId); }}>
              {label}
            </a>
          );
        }
        const boldMatch = tok.match(/^\*\*(.+)\*\*$/);
        if (boldMatch) {
          return <strong key={i} className="font-semibold">{boldMatch[1]}</strong>;
        }
        return tok;
      });
      // Auto-bold leading term before colon (e.g. "Goal: ..." → <strong>Goal:</strong> ...)
      // Only apply if first rendered token is a plain string starting with "Word(s):"
      if (!noBoldColon && rendered.length > 0 && typeof rendered[0] === 'string') {
        const leadMatch = rendered[0].match(/^([A-Za-z\s\-\/&\(\)]+:)\s*/);
        if (leadMatch) {
          const prefix = leadMatch[1];
          const rest = rendered[0].slice(leadMatch[0].length);
          rendered.splice(0, 1,
            React.createElement('strong', { key: 'lead', className: 'font-semibold' }, prefix),
            rest ? (' ' + rest) : ''
          );
        }
      }
      return rendered;
    }

    function flatSearch(query) {
      if (!query || query.trim().length < 2) return [];
      const q = query.toLowerCase().trim();
      const results = [];
      GUIDE_DATA.sections.forEach(section => {
        let matchScore = 0;
        let matchContext = '';
        if (section.title.toLowerCase().includes(q)) {
          matchScore += 10;
          matchContext = section.title;
        }
        if (section.tags && section.tags.some(t => t.toLowerCase().includes(q))) {
          matchScore += 5;
          const tag = section.tags.find(t => t.toLowerCase().includes(q));
          if (!matchContext) matchContext = `Tag: ${tag}`;
        }
        section.blocks.forEach(block => {
          if (block.title && block.title.toLowerCase().includes(q)) {
            matchScore += 3;
            if (!matchContext) matchContext = block.title;
          }
          if (block.content && Array.isArray(block.content)) {
            block.content.forEach(item => {
              const text = typeof item === 'string' ? item : (item.text || '');
              if (text.toLowerCase().includes(q)) {
                matchScore += 1;
                if (!matchContext) {
                  const idx = text.toLowerCase().indexOf(q);
                  const start = Math.max(0, idx - 30);
                  const end = Math.min(text.length, idx + q.length + 30);
                  matchContext = (start > 0 ? '...' : '') + text.substring(start, end) + (end < text.length ? '...' : '');
                }
              }
              if (item.sub && Array.isArray(item.sub)) {
                item.sub.forEach(s => {
                  if (typeof s === 'string' && s.toLowerCase().includes(q)) {
                    matchScore += 1;
                    if (!matchContext) {
                      const idx = s.toLowerCase().indexOf(q);
                      const start = Math.max(0, idx - 30);
                      const end = Math.min(s.length, idx + q.length + 30);
                      matchContext = (start > 0 ? '...' : '') + s.substring(start, end) + (end < s.length ? '...' : '');
                    }
                  }
                });
              }
            });
          }
          if (block.rows) {
            block.rows.forEach(row => {
              if (row.cells) {
                row.cells.forEach(cell => {
                  if (cell && cell.toLowerCase().includes(q)) {
                    matchScore += 1;
                    if (!matchContext) matchContext = cell.substring(0, 80);
                  }
                });
              }
            });
          }
        });
        if (matchScore > 0) {
          results.push({ section, matchScore, matchContext });
        }
      });
      results.sort((a, b) => b.matchScore - a.matchScore);
      return results;
    }

    function getCategoryForSection(sectionId) {
      return GUIDE_DATA.categories.find(c => c.sections.includes(sectionId));
    }

    // =========================================================================
    // COMPONENTS
    // =========================================================================

    // --- Collapsible Block ---
    function CollapsibleBlock({ title, children, defaultOpen = false, className = '', titleClassName = '', icon = null }) {
      const [open, setOpen] = useState(defaultOpen);
      const contentRef = useRef(null);
      const [maxH, setMaxH] = useState(defaultOpen ? 'none' : '0');

      useEffect(() => {
        if (open && contentRef.current) {
          setMaxH(contentRef.current.scrollHeight + 'px');
          const timer = setTimeout(() => setMaxH('none'), 350);
          return () => clearTimeout(timer);
        } else {
          if (contentRef.current) {
            setMaxH(contentRef.current.scrollHeight + 'px');
            requestAnimationFrame(() => { setMaxH('0'); });
          }
        }
      }, [open]);

      return (
        <div className={`block-card ${className}`}>
          <button
            onClick={() => setOpen(!open)}
            className={`w-full flex items-center justify-between px-4 py-3 text-left font-medium text-sm text-gray-800 hover:bg-gray-50 rounded-[10px] min-h-[44px] ${titleClassName}`}
          >
            <span className="flex items-center gap-2 flex-1 pr-2">
              {icon}
              {title}
            </span>
            <ChevronIcon open={open} />
          </button>
          <div
            ref={contentRef}
            className={`collapsible-content ${open ? 'expanded' : 'collapsed'}`}
            style={{ maxHeight: open ? maxH : '0' }}
          >
            <div className="px-4 pb-4 text-sm text-gray-700 leading-relaxed">
              {children}
            </div>
          </div>
        </div>
      );
    }

    // --- Red Flag Box (always expanded) ---
    function RedFlagBox({ title, children }) {
      return (
        <div className="rounded-lg mb-3 bg-red-50 border border-red-200" style={{ borderLeftWidth: '4px', borderLeftColor: '#DC2626' }}>
          <div className="px-4 py-3">
            <div className="flex items-center gap-2 font-semibold text-sm text-red-800 mb-2">
              <WarningIcon />
              <span>{title}</span>
            </div>
            <div className="text-sm text-red-900 leading-relaxed">
              {children}
            </div>
          </div>
        </div>
      );
    }

    // --- Escalation Box (always expanded) ---
    function EscalationBox({ title, children }) {
      return (
        <div className="rounded-lg mb-3 bg-amber-50 border border-amber-200" style={{ borderLeftWidth: '4px', borderLeftColor: '#D97706' }}>
          <div className="px-4 py-3">
            <div className="flex items-center gap-2 font-semibold text-sm text-amber-800 mb-2">
              <EscalationIcon />
              <span>{title}</span>
            </div>
            <div className="text-sm text-amber-900 leading-relaxed">
              {children}
            </div>
          </div>
        </div>
      );
    }

    // --- Caveat Banner ---
    function CaveatBanner({ text }) {
      return (
        <div className="bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 mb-4 text-sm text-slate-600 italic leading-relaxed">
          {text}
        </div>
      );
    }

    // --- Content Renderer with Reference Links ---
    function ContentList({ items, onRefClick, onNavigate, noBoldColon }) {
      if (!items || !Array.isArray(items)) return null;
      return (
        <ul className="list-disc list-outside pl-4 space-y-1.5">
          {items.map((item, i) => {
            if (typeof item === 'string') {
              return <li key={i}><RichText text={item} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} /></li>;
            }
            if (item.text) {
              return (
                <li key={i}>
                  {item.highlight ? (
                    <span className="bg-yellow-200 px-1 rounded font-semibold"><RichText text={item.text} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} /></span>
                  ) : (
                    <RichText text={item.text} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} />
                  )}
                  {item.sub && item.sub.length > 0 && (
                    <ul className="list-disc list-outside pl-4 mt-1 space-y-1">
                      {item.sub.map((s, j) => <li key={j}>{typeof s === 'string' ? <RichText text={s} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} /> : s}</li>)}
                    </ul>
                  )}
                </li>
              );
            }
            return null;
          })}
        </ul>
      );
    }

    // --- Rehab Table ---
    function RehabTable({ block, onRefClick, onNavigate }) {
      if (!block.columns || !block.rows) return null;
      return (
        <div>
          <div className="rehab-table-wrap rounded-lg border border-gray-200 overflow-hidden">
            <table className="w-full text-sm border-collapse">
              <thead>
                <tr>
                  <th className="text-left px-3 py-2.5 bg-blue-50 border-b border-gray-200 font-semibold text-xs text-blue-800 min-w-[100px]"></th>
                  {block.columns.map((col, i) => (
                    <th key={i} className="text-left px-3 py-2.5 bg-blue-50 border-b border-gray-200 font-semibold text-xs text-blue-800 min-w-[140px]">{col}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {block.rows.map((row, i) => (
                  <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                    <td className="px-3 py-2 border-b border-gray-100 font-semibold text-xs text-gray-700 align-top">
                      <RichText text={row.label} onRefClick={onRefClick} onNavigate={onNavigate} />
                    </td>
                    {row.cells.map((cell, j) => (
                      <td key={j} className="px-3 py-2 border-b border-gray-100 text-xs text-gray-700 align-top leading-relaxed" style={{whiteSpace: 'pre-line'}}>
                        <RichText text={cell} onRefClick={onRefClick} onNavigate={onNavigate} />
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {block.source && (
            <p className="text-xs text-gray-400 mt-1.5 italic">Source: <RichText text={block.source} onRefClick={onRefClick} onNavigate={onNavigate} /></p>
          )}
        </div>
      );
    }

    // --- Figure with real images ---
    function FigureBlock({ block, onRefClick }) {
      return (
        <div className="bg-white border border-gray-200 rounded-lg p-4 mb-3 shadow-sm">
          <img src={block.filename} alt={block.caption || block.title} className="figure-img mx-auto mb-3" onError={(e) => {
            e.target.style.display = 'none';
            e.target.nextSibling && (e.target.nextSibling.style.display = 'flex');
          }} />
          <div className="items-center justify-center h-24 bg-gray-100 rounded mb-2 text-gray-400 text-xs hidden">
            <span>[Image: {block.filename}]</span>
          </div>
          {block.caption && <p className="text-xs text-gray-600 text-center leading-relaxed"><RichText text={block.caption} onRefClick={onRefClick} /></p>}
          {block.attribution && <p className="text-xs text-gray-400 text-center mt-1 italic"><RichText text={block.attribution} onRefClick={onRefClick} /></p>}
        </div>
      );
    }

    // --- Reference Popover ---
    function RefPopover({ refNum, onClose }) {
      if (!refNum) return null;
      const refText = GUIDE_DATA.references[refNum - 1];
      if (!refText) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center" onClick={onClose}>
          <div className="absolute inset-0 bg-black/20" />
          <div className="relative bg-white rounded-t-2xl sm:rounded-2xl shadow-xl max-w-md w-full mx-4 mb-0 sm:mb-0 p-5 z-10" onClick={e => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-2">
              <span className="text-xs font-bold text-blue-600 bg-blue-50 rounded px-2 py-0.5">Reference {refNum}</span>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 min-w-[28px] min-h-[28px] flex items-center justify-center">
                <ClearIcon />
              </button>
            </div>
            <p className="text-sm text-gray-700 leading-relaxed">{refText}</p>
          </div>
        </div>
      );
    }

    // --- Block Renderer ---
    function SubsectionHeader({ title }) {
      return (
        <div className="mt-6 mb-3">
          <div className="flex items-center gap-3">
            <div className="w-1.5 h-6 bg-blue-500 rounded-full"></div>
            <h3 className="text-base font-bold text-gray-900">{title}</h3>
          </div>
          <div className="border-b border-blue-200 mt-2"></div>
        </div>
      );
    }

    function BlockRenderer({ block, onRefClick, onNavigate, noBoldColon }) {
      if (block.type === 'subsection-header') {
        return <SubsectionHeader title={block.title} />;
      }

      if (block.type === 'red-flags') {
        return (
          <RedFlagBox title={block.title}>
            <ContentList items={block.content} onRefClick={onRefClick} onNavigate={onNavigate} />
          </RedFlagBox>
        );
      }

      if (block.type === 'escalation') {
        return (
          <EscalationBox title={block.title}>
            <ContentList items={block.content} onRefClick={onRefClick} onNavigate={onNavigate} />
          </EscalationBox>
        );
      }

      if (block.type === 'figure') {
        return <FigureBlock block={block} onRefClick={onRefClick} onNavigate={onNavigate} />;
      }

      if ((block.type === 'rehab-timeline' || block.type === 'quick-ref') && block.columns && block.rows) {
        return (
          <CollapsibleBlock title={block.title}>
            <RehabTable block={block} onRefClick={onRefClick} onNavigate={onNavigate} />
          </CollapsibleBlock>
        );
      }

      if (block.type === 'drug-info') {
        return (
          <CollapsibleBlock title={block.title} titleClassName="text-blue-700">
            <ContentList items={block.content} onRefClick={onRefClick} onNavigate={onNavigate} />
          </CollapsibleBlock>
        );
      }

      if (block.type === 'note' && block.content && block.content.length === 1) {
        const singleItem = block.content[0];
        const textVal = typeof singleItem === 'string' ? singleItem : (singleItem.text || '');
        const isHighlighted = typeof singleItem === 'object' && singleItem.highlight;
        return (
          <CaveatBanner text={
            isHighlighted
              ? <span className="bg-yellow-200 px-1 rounded font-semibold"><RichText text={textVal} onRefClick={onRefClick} onNavigate={onNavigate} /></span>
              : <RichText text={textVal} onRefClick={onRefClick} onNavigate={onNavigate} />
          } />
        );
      }

      if (block.type === 'drug-cards') {
        return (
          <CollapsibleBlock title={block.title} defaultOpen={block.defaultOpen || false}>
            <div className="space-y-3">
              {block.drugs.map((drug, di) => (
                <div key={di} className="border border-gray-200 rounded-lg p-3 bg-white">
                  <div className="font-semibold text-sm text-gray-900 mb-1">{drug.name}</div>
                  <div className="text-xs text-gray-500 mb-2">{drug.class}</div>
                  <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-xs mb-2">
                    <div><span className="text-gray-500">Route:</span> <span className="text-gray-800">{drug.route}</span></div>
                    <div><span className="text-gray-500">Duration:</span> <span className="text-gray-800">{drug.duration}</span></div>
                  </div>
                  <div className="bg-blue-50 border border-blue-100 rounded px-2.5 py-2 text-xs text-blue-900">
                    <span className="font-semibold">Indication:</span> {drug.indication}
                  </div>
                </div>
              ))}
            </div>
            {block.source && (
              <p className="text-xs text-gray-400 italic mt-3">Source: <RichText text={block.source} onRefClick={onRefClick} onNavigate={onNavigate} /></p>
            )}
          </CollapsibleBlock>
        );
      }

      if (block.type === 'callout-box') {
        return (
          <div className="mt-3 mb-3 bg-yellow-50 border border-yellow-300 rounded-lg px-4 py-3">
            {block.content.map((item, i) => (
              <p key={i} className="text-sm text-yellow-900 font-medium leading-relaxed">
                <RichText text={typeof item === 'string' ? item : item.text} onRefClick={onRefClick} onNavigate={onNavigate} />
              </p>
            ))}
          </div>
        );
      }

      if (block.type === 'section-link') {
        return (
          <button
            onClick={() => {
              const viewType = block.targetType === 'category' ? 'category' : 'section';
              const evt = new CustomEvent('navigate-section', { detail: { id: block.targetId, type: viewType } });
              window.dispatchEvent(evt);
            }}
            className="mt-3 mb-3 w-full flex items-center justify-between px-4 py-3 bg-blue-50 border border-blue-200 rounded-lg text-sm font-semibold text-blue-700 hover:bg-blue-100 transition-colors min-h-[44px]"
          >
            <span>→ {block.label}</span>
            <ChevronIcon open={false} />
          </button>
        );
      }

      return (
        <CollapsibleBlock title={block.title} defaultOpen={block.defaultOpen || false}>
          {block.evidenceLevel && (
            <div className="mb-3 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
              <span className="text-xs font-semibold text-blue-800 uppercase tracking-wide">Evidence: </span>
              <span className="text-sm font-bold text-blue-900">{block.evidenceLevel}</span>
            </div>
          )}
          {block.subtitle && (
            <p className="text-xs text-gray-500 -mt-1 mb-2 italic">{block.subtitle}</p>
          )}
          {block.content && <ContentList items={block.content} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} />}
          {block.callout && (
            <div className="mt-3 bg-yellow-50 border border-yellow-300 rounded-lg px-4 py-3">
              <ul className="space-y-2">
                {block.callout.items.map((item, ci) => (
                  <li key={ci} className="flex items-start gap-2 text-sm text-yellow-900 font-medium">
                    <span className="mt-0.5 text-yellow-600">•</span>
                    <span><RichText text={item} onRefClick={onRefClick} onNavigate={onNavigate} /></span>
                  </li>
                ))}
              </ul>
            </div>
          )}
          {block.contentAfterCallout && <ContentList items={block.contentAfterCallout} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={noBoldColon} />}
        </CollapsibleBlock>
      );
    }

    // --- Footer ---
    function Footer() {
      return (
        <footer className="mt-10 pt-4 pb-8 border-t border-gray-200">
          <p className="text-xs text-gray-400 leading-relaxed text-center max-w-md mx-auto">
            {GUIDE_DATA.meta.footerDisclaimer}
          </p>
        </footer>
      );
    }

    // =========================================================================
    // VIEWS
    // =========================================================================

    // Category icon mapping
    const categoryIcons = {
      'common-complaints': (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#2563EB" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M10 2a6 6 0 016 6c0 2.5-1.5 4.5-3 6l-3 4-3-4c-1.5-1.5-3-3.5-3-6a6 6 0 016-6z"/>
          <circle cx="10" cy="8" r="2"/>
        </svg>
      ),
      'common-issues': (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#2563EB" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="14" height="14" rx="2"/>
          <path d="M7 7h6M7 10h6M7 13h4"/>
        </svg>
      ),
      'rehabilitation': (
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#2563EB" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M10 2v4M10 14v4"/>
          <path d="M2 10h4M14 10h4"/>
          <path d="M4.93 4.93l2.83 2.83M12.24 12.24l2.83 2.83"/>
          <path d="M15.07 4.93l-2.83 2.83M7.76 12.24l-2.83 2.83"/>
          <circle cx="10" cy="10" r="3"/>
        </svg>
      ),
    };

    // --- Home View ---
    function HomeView({ onNavigate }) {
      return (
        <div>
          {/* Header area */}
          <div className="text-center pt-3 pb-3">
            <img src="media/logo.png" alt="XFU" className="mx-auto mb-1" style={{maxWidth: '320px', width: '80%', height: 'auto'}} />
            <p className="text-sm text-gray-500 mt-1 font-medium">{GUIDE_DATA.meta.subtitle}</p>
            {GUIDE_DATA.meta.description && <p className="text-xs text-gray-400 mt-1">{GUIDE_DATA.meta.description}</p>}
          </div>

          {/* Disclaimer */}
          <div className="rounded-xl border border-orange-200 bg-orange-50 px-4 py-3.5 mb-1">
            <p className="text-sm text-orange-900 leading-relaxed italic">{GUIDE_DATA.meta.disclaimer}</p>
          </div>

          {/* Category cards */}
          <div className="space-y-3 mt-5">
            {GUIDE_DATA.categories.map(cat => (
              <button
                key={cat.id}
                onClick={() => onNavigate('category', cat.id)}
                className="category-card w-full text-left min-h-[44px]"
              >
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="flex-shrink-0 w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                      {categoryIcons[cat.id]}
                    </div>
                    <div>
                      <h2 className="text-base font-semibold text-gray-900">{cat.title}</h2>
                      <p className="text-xs text-gray-500 mt-0.5">{cat.description}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-1.5 flex-shrink-0 ml-2">
                    <span className="text-xs bg-blue-100 text-blue-700 rounded-full px-2.5 py-0.5 font-semibold">{cat.sections.length}</span>
                    <ChevronIcon open={false} />
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* General Principles */}
          <div className="mt-7">
            <CollapsibleBlock title="General Principles" icon={<BookIcon />}>
              <ContentList items={GUIDE_DATA.generalPrinciples} />
            </CollapsibleBlock>
          </div>

          {/* Accessible Resources */}
          <div className="mt-1">
            <CollapsibleBlock title="Accessible Resources" icon={<BookIcon />}>
              <ul className="list-disc list-outside pl-4 space-y-1.5">
                {GUIDE_DATA.accessibleResources.map((r, i) => (
                  <li key={i}>{r}</li>
                ))}
              </ul>
            </CollapsibleBlock>
          </div>

          {/* References */}
          <div className="mt-1">
            <CollapsibleBlock title="References" icon={<BookIcon />}>
              <ol className="list-decimal list-outside pl-4 space-y-1.5 text-xs text-gray-600">
                {GUIDE_DATA.references.map((r, i) => (
                  <li key={i} id={`ref-${i + 1}`}>{r}</li>
                ))}
              </ol>
            </CollapsibleBlock>
          </div>

          {/* About Section */}
          <div className="mt-8 pt-6 border-t border-gray-200 text-center space-y-1">
            <p className="text-sm font-semibold text-gray-700">XFU — A Practical Reference for Junior Residents</p>
            <p className="text-xs text-gray-500">Author: Dr Gene Leung</p>
            <p className="text-xs text-gray-500">Version: 1.0</p>
            <p className="text-xs text-gray-500">Created: March 2026</p>
            <p className="text-xs text-gray-500">Last updated: 28 March 2026</p>
            <p className="text-xs text-gray-400 mt-2 italic">Independent educational reference tool</p>
          </div>

          <Footer />
        </div>
      );
    }

    // --- Category View ---
    function CategoryView({ categoryId, onNavigate, onRefClick }) {
      const category = GUIDE_DATA.categories.find(c => c.id === categoryId);
      if (!category) return <div className="p-4">Category not found.</div>;

      const sectionsList = category.sections.map(sId => GUIDE_DATA.sections.find(s => s.id === sId)).filter(Boolean);

      return (
        <div>
          <div className="flex items-center gap-3 mt-2 mb-4">
            <div className="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
              {categoryIcons[category.id]}
            </div>
            <div>
              <h2 className="text-lg font-bold text-gray-900">{category.title}</h2>
              <p className="text-xs text-gray-500">{category.description}</p>
            </div>
          </div>

          {category.inlineBlocks && category.inlineBlocks.map((block, i) => (
            <BlockRenderer key={'ib-'+i} block={block} onRefClick={onRefClick} onNavigate={onNavigate} />
          ))}

          <div className="space-y-2">
            {category.groups ? (
              category.groups.map((group, gi) => (
                <React.Fragment key={gi}>
                  {group.title && (
                    <div className="mt-5 mb-2">
                      <div className="flex items-center gap-3">
                        <div className="w-1.5 h-6 bg-blue-500 rounded-full"></div>
                        <h3 className="text-sm font-bold text-gray-700">{group.title}</h3>
                      </div>
                      <div className="border-b border-blue-200 mt-2"></div>
                    </div>
                  )}
                  {group.sections.map(sId => {
                    const section = GUIDE_DATA.sections.find(s => s.id === sId);
                    if (!section) return null;
                    return (
                      <button
                        key={section.id}
                        onClick={() => onNavigate('section', section.id)}
                        className="section-card w-full text-left min-h-[44px]"
                      >
                        <div className="flex items-center justify-between">
                          <h3 className="text-sm font-semibold text-gray-900">{section.title}</h3>
                          <ChevronIcon open={false} />
                        </div>
                      </button>
                    );
                  })}
                </React.Fragment>
              ))
            ) : (
              sectionsList.map(section => (
                <button
                  key={section.id}
                  onClick={() => onNavigate('section', section.id)}
                  className="section-card w-full text-left min-h-[44px]"
                >
                  <div className="flex items-center justify-between">
                    <h3 className="text-sm font-semibold text-gray-900">{section.title}</h3>
                    <ChevronIcon open={false} />
                  </div>
                </button>
              ))
            )}
          </div>

          <Footer />
        </div>
      );
    }

    // --- Section View ---
    function SectionView({ sectionId, onRefClick, onNavigate }) {
      const section = GUIDE_DATA.sections.find(s => s.id === sectionId);
      if (!section) return <div className="p-4">Section not found.</div>;

      const protocolIds = ['acl-reconstruction', 'meniscal-repair', 'reverse-shoulder', 'rotator-cuff-repair', 'bankart-repair', 'achilles-rupture'];
      const isProtocol = protocolIds.includes(section.id);
      const isSickLeave = section.id === 'sick-leave';

      const childSections = section.children
        ? section.children.map(cId => GUIDE_DATA.sections.find(s => s.id === cId)).filter(Boolean)
        : [];

      return (
        <div>
          <h2 className="text-lg font-bold text-gray-900 mt-2 mb-3">{section.title}</h2>

          {isProtocol && (
            <CaveatBanner text={GUIDE_DATA.meta.protocolCaveat} />
          )}

          {isSickLeave && section.note && (
            <CaveatBanner text={section.note} />
          )}

          {section.note && !isSickLeave && (
            <CaveatBanner text={section.note} />
          )}

          {section.blocks.length > 0 && (
            <div className="space-y-0">
              {section.blocks.map((block, i) => (
                <BlockRenderer key={i} block={block} onRefClick={onRefClick} onNavigate={onNavigate} noBoldColon={section.noBoldColon} />
              ))}
            </div>
          )}

          {childSections.length > 0 && (
            <div className="space-y-2 mt-3">
              {childSections.map(child => (
                <button
                  key={child.id}
                  onClick={() => onNavigate('section', child.id)}
                  className="section-card w-full text-left min-h-[44px]"
                >
                  <div className="flex items-center justify-between">
                    <h3 className="text-sm font-semibold text-gray-900">{child.title}</h3>
                    <ChevronIcon open={false} />
                  </div>
                </button>
              ))}
            </div>
          )}

          <Footer />
        </div>
      );
    }

    // --- Search Results View ---
    function SearchResultsView({ query, onNavigate }) {
      const results = useMemo(() => flatSearch(query), [query]);

      if (query.trim().length < 2) {
        return (
          <div className="text-center py-12 text-gray-400 text-sm">
            Type at least 2 characters to search.
          </div>
        );
      }

      if (results.length === 0) {
        return (
          <div className="text-center py-12">
            <p className="text-gray-400 text-sm">No results found for &ldquo;{query}&rdquo;</p>
          </div>
        );
      }

      return (
        <div>
          <p className="text-xs text-gray-400 mb-3">{results.length} result{results.length !== 1 ? 's' : ''} for &ldquo;{query}&rdquo;</p>
          <div className="space-y-2">
            {results.map(({ section, matchContext }) => {
              const cat = getCategoryForSection(section.id);
              return (
                <button
                  key={section.id}
                  onClick={() => onNavigate('section', section.id)}
                  className="section-card w-full text-left min-h-[44px]"
                >
                  <div className="flex items-center justify-between">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <h3 className="text-sm font-semibold text-gray-900">{section.title}</h3>
                        {cat && <span className="text-xs bg-gray-100 text-gray-500 rounded px-1.5 py-0.5 whitespace-nowrap">{cat.title}</span>}
                      </div>
                      {matchContext && (
                        <p className="text-xs text-gray-500 mt-1 truncate">{matchContext}</p>
                      )}
                    </div>
                    <ChevronIcon open={false} />
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // =========================================================================
    // APP
    // =========================================================================
    function App() {
      const [view, setView] = useState('home');
      const [viewId, setViewId] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearchOpen, setIsSearchOpen] = useState(false);
      const [history, setHistory] = useState([]);
      const [activeRef, setActiveRef] = useState(null);
      const searchInputRef = useRef(null);

      const navigate = useCallback((newView, newId = null) => {
        setHistory(prev => [...prev, { view, viewId }]);
        setView(newView);
        setViewId(newId);
        setSearchQuery('');
        setIsSearchOpen(false);
        window.scrollTo(0, 0);
      }, [view, viewId]);

      const goBack = useCallback(() => {
        if (history.length > 0) {
          const prev = history[history.length - 1];
          setHistory(h => h.slice(0, -1));
          setView(prev.view);
          setViewId(prev.viewId);
          setSearchQuery('');
          setIsSearchOpen(false);
          window.scrollTo(0, 0);
        }
      }, [history]);

      useEffect(() => {
        const handler = (e) => {
          if (typeof e.detail === 'object' && e.detail.type) {
            navigate(e.detail.type, e.detail.id);
          } else {
            navigate('section', e.detail);
          }
        };
        window.addEventListener('navigate-section', handler);
        return () => window.removeEventListener('navigate-section', handler);
      }, [navigate]);

      const handleSearchChange = (e) => {
        setSearchQuery(e.target.value);
      };

      const clearSearch = () => {
        setSearchQuery('');
        setIsSearchOpen(false);
        searchInputRef.current && searchInputRef.current.blur();
      };

      const openSearch = () => {
        setIsSearchOpen(true);
        setTimeout(() => searchInputRef.current && searchInputRef.current.focus(), 100);
      };

      const handleRefClick = (refNum) => {
        setActiveRef(refNum);
      };

      const showBack = view !== 'home';
      const isSearching = searchQuery.trim().length > 0;

      return (
        <div className="min-h-screen">
          {/* Sticky Header */}
          <header className="sticky top-0 z-50 border-b border-gray-200 px-4">
            <div className="max-w-[720px] mx-auto flex items-center h-12 gap-2">
              {showBack && !isSearching ? (
                <button onClick={goBack} className="min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-600 hover:text-blue-600 -ml-2">
                  <BackIcon />
                </button>
              ) : isSearching ? (
                <button onClick={clearSearch} className="min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-600 hover:text-blue-600 -ml-2">
                  <BackIcon />
                </button>
              ) : null}

              {(!isSearchOpen || window.innerWidth >= 640) && !isSearching && (
                <button
                  onClick={() => { setHistory([]); setView('home'); setViewId(null); setSearchQuery(''); setIsSearchOpen(false); window.scrollTo(0,0); }}
                  className="flex-1 text-left min-h-[44px] flex items-center"
                >
                  <span className="text-sm font-semibold text-gray-800 truncate">
                    {view === 'home' ? 'XFU' :
                     view === 'category' ? (GUIDE_DATA.categories.find(c => c.id === viewId)?.title || '') :
                     view === 'section' ? (GUIDE_DATA.sections.find(s => s.id === viewId)?.title || '') :
                     'XFU'}
                  </span>
                </button>
              )}

              {(isSearchOpen || isSearching) && (
                <div className="flex-1 flex items-center bg-white border border-gray-200 rounded-lg px-3 h-9 shadow-sm">
                  <SearchIcon />
                  <input
                    ref={searchInputRef}
                    type="text"
                    placeholder="Search sections, tags, content..."
                    value={searchQuery}
                    onChange={handleSearchChange}
                    className="flex-1 bg-transparent outline-none text-sm text-gray-800 ml-2 placeholder-gray-400"
                  />
                  {searchQuery && (
                    <button onClick={() => setSearchQuery('')} className="min-w-[28px] min-h-[28px] flex items-center justify-center text-gray-400 hover:text-gray-600">
                      <ClearIcon />
                    </button>
                  )}
                </div>
              )}

              {!isSearchOpen && !isSearching && (
                <button onClick={openSearch} className="min-w-[44px] min-h-[44px] flex items-center justify-center text-gray-500 hover:text-blue-600 -mr-2">
                  <SearchIcon />
                </button>
              )}
            </div>
          </header>

          {/* Main content */}
          <main className="max-w-[720px] mx-auto px-4 py-4">
            {isSearching ? (
              <SearchResultsView query={searchQuery} onNavigate={navigate} />
            ) : view === 'home' ? (
              <HomeView onNavigate={navigate} />
            ) : view === 'category' ? (
              <CategoryView categoryId={viewId} onNavigate={navigate} onRefClick={handleRefClick} />
            ) : view === 'section' ? (
              <SectionView sectionId={viewId} onRefClick={handleRefClick} onNavigate={navigate} />
            ) : null}
          </main>

          {/* Reference Popover */}
          {activeRef && <RefPopover refNum={activeRef} onClose={() => setActiveRef(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
